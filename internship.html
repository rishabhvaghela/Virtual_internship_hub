<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internships - Virtual Internship Hub</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/png" href="assets/images/logo/Web Icon.png">
  <link rel="stylesheet" href="assets/css/internship.css">

</head>

<body>

  <!-- Back Button -->
  <a id="backLink" class="back-btn" href="#">
    <img src="assets/svg/cancel.svg" alt="">
  </a>


  <!-- HERO SECTION -->
  <section class="hero">

    <div class="hero-content">

      <h1>Find Your Perfect Internship 🚀</h1>

      <p>
        Search internships by role, company, or skills and start your career journey.
      </p>

      <!-- SEARCH BOX -->
      <div class="search-box">

        <input
          type="text"
          id="searchInput"
          placeholder="Search by role, company, or skills..."
          autocomplete="off"
        >

        <button id="searchBtn">
          <i class="fas fa-search"></i>
          Search
        </button>

      </div>

    </div>

  </section>


  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- RESULTS INFO -->
    <div class="results-header">

      <h2 id="resultsCount">
        All Internships
      </h2>

    </div>


    <!-- NO RESULTS -->
    <div id="noInternship" class="no-internship">

      <i class="fas fa-briefcase"></i>

      <h3>No internships found</h3>

      <p>
        Try searching with different keywords
      </p>

    </div>


    <!-- INTERNSHIP GRID -->
    <div
      class="internship-grid"
      id="internshipGrid"
    >
    </div>


  </main>



  <!-- TOAST -->
  <div id="toastContainer" class="toast-container"></div>


  <!-- LOADER -->
  <div id="pageLoader" class="page-loader">

    <div class="loader-spinner"></div>

  </div>



  <!-- SCRIPT -->
  <script src="assets/js/internship.js"></script>

</body>

</html>
